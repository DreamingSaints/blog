<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180" role="img" aria-labelledby="title desc">
  <title id="title">Initial density matrix scan</title>
  <desc id="desc">Quantum scan mapping cargo into digital density matrix template</desc>
  <rect width="400" height="180" fill="#0d1117"/>
  <rect x="4" y="4" width="392" height="172" rx="5" fill="#161b22" stroke="#30363d"/>
  <text x="200" y="22" text-anchor="middle" fill="#ff8c42" font-family="system-ui,sans-serif" font-size="11" font-weight="600">rho_0 - DENSITY MATRIX SCAN</text>
  <rect x="140" y="40" width="120" height="70" rx="3" fill="#262c36" stroke="#ff8c42" stroke-width="1.2"/>
  <text x="200" y="78" text-anchor="middle" fill="#c9d1d9" font-family="system-ui,sans-serif" font-size="10">CARGO</text>
  <g stroke="#ff8c42" stroke-width="0.8" opacity="0.7">
    <line x1="40" y1="50" x2="140" y2="55"/><line x1="40" y1="75" x2="140" y2="75"/>
    <line x1="40" y1="100" x2="140" y2="95"/><line x1="360" y1="50" x2="260" y2="55"/>
    <line x1="360" y1="75" x2="260" y2="75"/><line x1="360" y1="100" x2="260" y2="95"/>
    <line x1="200" y1="30" x2="200" y2="40"/><line x1="200" y1="110" x2="200" y2="120"/>
  </g>
  <g transform="translate(48,118)" fill="none" stroke="#8b949e" stroke-width="0.6">
    <rect width="64" height="48" rx="2" fill="#0d1117"/>
    <line x1="16" y1="0" x2="16" y2="48"/><line x1="32" y1="0" x2="32" y2="48"/><line x1="48" y1="0" x2="48" y2="48"/>
    <line x1="0" y1="12" x2="64" y2="12"/><line x1="0" y1="24" x2="64" y2="24"/><line x1="0" y1="36" x2="64" y2="36"/>
  </g>
  <text x="80" y="172" text-anchor="middle" fill="#8b949e" font-family="system-ui,sans-serif" font-size="8">digital template</text>
  <g transform="translate(288,118)" fill="#ff8c42" fill-opacity="0.15" stroke="#ff8c42" stroke-width="0.8">
    <rect width="64" height="48" rx="2"/>
    <circle cx="12" cy="12" r="3" fill="#ff8c42"/><circle cx="36" cy="24" r="3" fill="#ff8c42"/><circle cx="52" cy="36" r="3" fill="#ff8c42"/>
  </g>
  <text x="320" y="172" text-anchor="middle" fill="#8b949e" font-family="system-ui,sans-serif" font-size="8">rho_0 state map</text>
  <text x="200" y="155" text-anchor="middle" fill="#c9d1d9" font-family="system-ui,sans-serif" font-size="8">mass, shape, internal atomic states</text>
</svg>
