  <path d="M78 98 Q140 88 200 98 T322 98" fill="none" stroke="#ffab70" stroke-width="1.5" opacity="0.9"/>
  <path d="M78 98 Q140 108 200 98 T322 98" fill="none" stroke="#ff8c42" stroke-width="0.8" opacity="0.4"/>
