    <rect x="232" y="72" width="72" height="48" rx="4" fill="#0d1117" stroke="#ff8c42" stroke-width="1"/>
    <text x="268" y="96" text-anchor="middle" fill="#ff8c42">M.grad B</text>
    <rect x="330" y="72" width="72" height="48" rx="4" fill="#0d1117" stroke="#ff8c42" stroke-width="1"/>
    <text x="366" y="96" text-anchor="middle" fill="#ff8c42">Omega</text>
